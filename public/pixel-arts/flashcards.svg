<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 20 20"
  preserveAspectRatio="xMidYMid meet"
  shape-rendering="crispEdges">
  <g fill="currentColor">
    <!-- Two cards peeking out behind the front card -->
    <rect x="8" y="1" width="9" height="1" />
    <rect x="17" y="2" width="1" height="10" />
    <rect x="16" y="12" width="1" height="1" />

    <rect x="5" y="4" width="9" height="1" />
    <rect x="14" y="5" width="1" height="10" />
    <rect x="13" y="15" width="1" height="1" />

    <!-- Front card -->
    <rect x="3" y="7" width="9" height="1" />
    <rect x="2" y="8" width="1" height="9" />
    <rect x="12" y="8" width="1" height="9" />
    <rect x="3" y="17" width="9" height="1" />

    <!-- Centred question mark -->
    <rect x="6" y="10" width="3" height="1" />
    <rect x="5" y="11" width="1" height="1" />
    <rect x="9" y="11" width="1" height="2" />
    <rect x="8" y="13" width="1" height="1" />
    <rect x="7" y="14" width="1" height="1" />
    <rect x="7" y="16" width="1" height="1" />
  </g>
</svg>
